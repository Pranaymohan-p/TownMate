spring.application.name=townmate-backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/townmate_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true

# JWT Configuration
app.jwt.secret=your-super-secret-key-here-min-32-characters-long-for-jwt-signing
app.jwt.expiration=86400000


# Logging
logging.level.root=INFO
logging.level.com.townmate=DEBUG

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
